<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Puppies</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
            font-size: 2.2em;
            margin: 30px 0 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .dogs-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            max-width: 900px;
            margin: 0 auto;
        }

        .dog-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            width: 320px;
            text-align: center;
        }

        .dog-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .dog-photo {
            width: 280px;
            height: 280px;
            object-fit: cover;
            border-radius: 15px;
            border: 4px solid #f8c291;
            background: #ffeaa7;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5em;
            margin: 0 auto;
            overflow: hidden;
        }

        .dog-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .dog-card .dog-name {
            margin-top: 15px;
            font-size: 1.6em;
            font-weight: bold;
            color: #e17055;
        }

        /* 모달 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 25px;
            padding: 30px;
            width: 420px;
            max-width: 90vw;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.8em;
            cursor: pointer;
            color: #999;
            background: none;
            border: none;
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: #333;
        }

        .modal-photo {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 5px solid #f8c291;
            background: #ffeaa7;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
            overflow: hidden;
            position: relative;
        }

        .modal-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-upload-btn {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 36px;
            height: 36px;
            background: #e17055;
            color: white;
            border: 3px solid white;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1em;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .photo-upload-btn.show {
            display: flex;
        }

        .modal h2 {
            text-align: center;
            color: #e17055;
            font-size: 1.8em;
            margin-bottom: 20px;
        }

        .profile-info {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .profile-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            background: #ffeaa7;
            border-radius: 12px;
        }

        .profile-row .label {
            font-weight: bold;
            color: #636e72;
            min-width: 80px;
            flex-shrink: 0;
        }

        .profile-row .value {
            color: #2d3436;
            font-size: 1.1em;
        }

        .edit-input {
            border: 2px solid #f8c291;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 1em;
            width: 100%;
            outline: none;
            color: #2d3436;
            flex: 1;
        }

        .edit-input:focus {
            border-color: #e17055;
        }

        .btn-edit {
            display: block;
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            background: linear-gradient(135deg, #e17055, #f8c291);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-edit:hover {
            opacity: 0.9;
        }

        .btn-save {
            display: block;
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            background: linear-gradient(135deg, #00b894, #55efc4);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-save:hover {
            opacity: 0.9;
        }

        .paw-print {
            text-align: center;
            margin-top: 40px;
            font-size: 2em;
            opacity: 0.3;
        }

        .hidden-input {
            display: none;
        }
    </style>
</head>
<body>

    <h1>Our Puppies</h1>

    <div class="dogs-container" id="dogsContainer"></div>

    <div class="paw-print">&#128062; &#128062; &#128062;</div>

    <!-- 프로필 모달 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <button class="modal-close" onclick="closeProfile()">&times;</button>
            <div class="modal-photo" id="modalPhoto">
                <span id="modalPhotoPlaceholder"></span>
                <button class="photo-upload-btn" id="photoUploadBtn" onclick="triggerPhotoUpload()">&#128247;</button>
            </div>
            <input type="file" accept="image/*" class="hidden-input" id="photoInput" onchange="handlePhotoUpload(event)">
            <h2 id="modalTitle"></h2>
            <div class="profile-info" id="profileInfo"></div>
            <button class="btn-edit" id="btnAction" onclick="toggleEdit()">프로필 수정</button>
        </div>
    </div>

    <script>
        const dogs = [
            {
                name: '엘리',
                age: '',
                nickname: '',
                gender: '',
                owner: '',
                photo: ''
            },
            {
                name: '피크',
                age: '',
                nickname: '',
                gender: '',
                owner: '',
                photo: ''
            }
        ];

        const fields = [
            { key: 'name', label: '이름' },
            { key: 'age', label: '나이' },
            { key: 'nickname', label: '별명' },
            { key: 'gender', label: '성별' },
            { key: 'owner', label: '주인' }
        ];

        const defaultEmojis = ['&#128054;', '&#128021;'];

        // localStorage에서 저장된 데이터 불러오기
        function loadData() {
            const saved = localStorage.getItem('dogProfiles');
            if (saved) {
                const parsed = JSON.parse(saved);
                parsed.forEach((savedDog, i) => {
                    if (dogs[i]) {
                        Object.assign(dogs[i], savedDog);
                    }
                });
            }
        }

        function saveData() {
            localStorage.setItem('dogProfiles', JSON.stringify(dogs));
        }

        loadData();

        let currentDog = null;
        let isEditing = false;

        function renderCards() {
            const container = document.getElementById('dogsContainer');
            container.innerHTML = '';

            dogs.forEach((dog, i) => {
                const card = document.createElement('div');
                card.className = 'dog-card';
                card.onclick = () => openProfile(i);

                let photoHTML;
                if (dog.photo) {
                    photoHTML = `<div class="dog-photo"><img src="${dog.photo}" alt="${dog.name}"></div>`;
                } else {
                    photoHTML = `<div class="dog-photo">${defaultEmojis[i]}</div>`;
                }

                card.innerHTML = `
                    ${photoHTML}
                    <div class="dog-name">${dog.name}</div>
                `;
                container.appendChild(card);
            });
        }

        function openProfile(index) {
            currentDog = index;
            isEditing = false;
            renderProfile();
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeProfile() {
            document.getElementById('modalOverlay').classList.remove('active');
            currentDog = null;
            isEditing = false;
        }

        function renderProfile() {
            const dog = dogs[currentDog];
            const modalPhoto = document.getElementById('modalPhoto');
            const placeholder = document.getElementById('modalPhotoPlaceholder');
            const uploadBtn = document.getElementById('photoUploadBtn');

            // 기존 이미지 제거
            const existingImg = modalPhoto.querySelector('img');
            if (existingImg) existingImg.remove();

            if (dog.photo) {
                const img = document.createElement('img');
                img.src = dog.photo;
                img.alt = dog.name;
                modalPhoto.insertBefore(img, placeholder);
                placeholder.style.display = 'none';
            } else {
                placeholder.innerHTML = defaultEmojis[currentDog];
                placeholder.style.display = 'block';
            }

            uploadBtn.classList.toggle('show', isEditing);

            document.getElementById('modalTitle').textContent = dog.name;

            const container = document.getElementById('profileInfo');
            container.innerHTML = '';

            fields.forEach(field => {
                const row = document.createElement('div');
                row.className = 'profile-row';

                if (isEditing) {
                    row.innerHTML = `
                        <span class="label">${field.label}</span>
                        <input class="edit-input" type="text" data-key="${field.key}"
                               value="${dog[field.key] || ''}"
                               placeholder="${field.label}을(를) 입력하세요">
                    `;
                } else {
                    row.innerHTML = `
                        <span class="label">${field.label}</span>
                        <span class="value">${dog[field.key] || '미입력'}</span>
                    `;
                }

                container.appendChild(row);
            });

            const btn = document.getElementById('btnAction');
            if (isEditing) {
                btn.textContent = '저장하기';
                btn.className = 'btn-save';
                btn.onclick = saveProfile;
            } else {
                btn.textContent = '프로필 수정';
                btn.className = 'btn-edit';
                btn.onclick = toggleEdit;
            }
        }

        function toggleEdit() {
            isEditing = true;
            renderProfile();
        }

        function saveProfile() {
            const inputs = document.querySelectorAll('.edit-input');
            inputs.forEach(input => {
                dogs[currentDog][input.dataset.key] = input.value;
            });

            saveData();
            isEditing = false;
            renderProfile();
            renderCards();
        }

        function triggerPhotoUpload() {
            document.getElementById('photoInput').click();
        }

        function handlePhotoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                dogs[currentDog].photo = e.target.result;
                saveData();
                renderProfile();
                renderCards();
            };
            reader.readAsDataURL(file);
            event.target.value = '';
        }

        // 모달 바깥 클릭 시 닫기
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeProfile();
        });

        // ESC 키로 닫기
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeProfile();
        });

        // 초기 렌더링
        renderCards();
    </script>

</body>
</html>
