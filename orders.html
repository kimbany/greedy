<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문 통합 수집 대시보드</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            color: #333;
        }

        /* 네비게이션 */
        .navbar {
            background: linear-gradient(135deg, #2d3436, #636e72);
            color: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .navbar h1 { font-size: 1.4em; }

        .navbar .nav-links {
            display: flex;
            gap: 16px;
        }

        .navbar button {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.2s;
        }

        .navbar button:hover { background: rgba(255,255,255,0.25); }

        /* 대시보드 컨테이너 */
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* 플랫폼 상태 카드 */
        .platform-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .platform-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .platform-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 0.8em;
            flex-shrink: 0;
        }

        .platform-icon.coupang { background: #e44232; }
        .platform-icon.naver { background: #03c75a; }
        .platform-icon.cafe24 { background: #1a73e8; }

        .platform-info { flex: 1; }
        .platform-info .name { font-weight: bold; font-size: 1.1em; }
        .platform-info .status {
            font-size: 0.85em;
            margin-top: 4px;
        }
        .platform-info .status.connected { color: #00b894; }
        .platform-info .status.disconnected { color: #d63031; }

        .platform-card .order-count {
            font-size: 1.8em;
            font-weight: bold;
            color: #2d3436;
        }

        /* 컨트롤 영역 */
        .controls {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .controls label {
            font-weight: 600;
            font-size: 0.9em;
            color: #636e72;
        }

        .controls input[type="date"] {
            border: 2px solid #dfe6e9;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.95em;
            outline: none;
        }

        .controls input[type="date"]:focus {
            border-color: #0984e3;
        }

        .btn-collect {
            background: linear-gradient(135deg, #0984e3, #74b9ff);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-collect:hover { opacity: 0.9; }
        .btn-collect:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-export {
            background: linear-gradient(135deg, #00b894, #55efc4);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: bold;
            cursor: pointer;
            margin-left: auto;
        }

        .btn-export:hover { opacity: 0.9; }

        .collect-status {
            font-size: 0.9em;
            color: #636e72;
        }

        /* 주문 테이블 */
        .orders-section {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .orders-header {
            padding: 16px 20px;
            border-bottom: 1px solid #dfe6e9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .orders-header h2 {
            font-size: 1.1em;
            color: #2d3436;
        }

        .orders-header .total {
            color: #636e72;
            font-size: 0.9em;
        }

        .orders-table-wrap {
            overflow-x: auto;
        }

        .orders-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }

        .orders-table th {
            background: #f8f9fa;
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            color: #636e72;
            white-space: nowrap;
            border-bottom: 2px solid #dfe6e9;
            position: sticky;
            top: 0;
        }

        .orders-table td {
            padding: 12px 16px;
            border-bottom: 1px solid #f1f2f6;
            white-space: nowrap;
        }

        .orders-table tr:hover {
            background: #f8f9fa;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
        }

        .badge.coupang { background: #ffeaea; color: #e44232; }
        .badge.naver { background: #e8f8ef; color: #03c75a; }
        .badge.cafe24 { background: #e8f0fe; color: #1a73e8; }

        .badge-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            background: #ffeaa7;
            color: #d35400;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #b2bec3;
        }

        .empty-state .icon { font-size: 3em; margin-bottom: 16px; }
        .empty-state p { font-size: 1.1em; }

        /* 설정 모달 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: white;
            border-radius: 16px;
            padding: 32px;
            width: 560px;
            max-width: 90vw;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal h2 {
            font-size: 1.3em;
            margin-bottom: 24px;
            color: #2d3436;
        }

        .modal-close {
            float: right;
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #999;
        }

        .config-section {
            margin-bottom: 24px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .config-section h3 {
            font-size: 1em;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .config-section h3 .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .config-section h3 .dot.coupang { background: #e44232; }
        .config-section h3 .dot.naver { background: #03c75a; }
        .config-section h3 .dot.cafe24 { background: #1a73e8; }

        .form-row {
            margin-bottom: 10px;
        }

        .form-row label {
            display: block;
            font-size: 0.85em;
            color: #636e72;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .form-row input {
            width: 100%;
            border: 2px solid #dfe6e9;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.95em;
            outline: none;
        }

        .form-row input:focus { border-color: #0984e3; }

        .btn-config-save {
            background: #0984e3;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85em;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-config-save:hover { opacity: 0.9; }

        .config-status {
            font-size: 0.85em;
            margin-top: 8px;
        }

        .config-status.success { color: #00b894; }
        .config-status.error { color: #d63031; }

        /* 반응형 */
        @media (max-width: 768px) {
            .navbar { flex-direction: column; gap: 12px; }
            .controls { flex-direction: column; align-items: stretch; }
            .btn-export { margin-left: 0; }
            .dashboard { padding: 16px; }
        }
    </style>
</head>
<body>

    <!-- 네비게이션 -->
    <nav class="navbar">
        <h1>주문 통합 수집 대시보드</h1>
        <div class="nav-links">
            <button onclick="openSettings()">API 설정</button>
            <a href="index.html"><button>메인으로</button></a>
        </div>
    </nav>

    <div class="dashboard">
        <!-- 플랫폼 상태 카드 -->
        <div class="platform-cards">
            <div class="platform-card">
                <div class="platform-icon coupang">쿠팡</div>
                <div class="platform-info">
                    <div class="name">쿠팡 파트너센터</div>
                    <div class="status disconnected" id="statusCoupang">미연결</div>
                </div>
                <div class="order-count" id="countCoupang">-</div>
            </div>
            <div class="platform-card">
                <div class="platform-icon naver">네이버</div>
                <div class="platform-info">
                    <div class="name">네이버 스마트스토어</div>
                    <div class="status disconnected" id="statusNaver">미연결</div>
                </div>
                <div class="order-count" id="countNaver">-</div>
            </div>
            <div class="platform-card">
                <div class="platform-icon cafe24">C24</div>
                <div class="platform-info">
                    <div class="name">카페24</div>
                    <div class="status disconnected" id="statusCafe24">미연결</div>
                </div>
                <div class="order-count" id="countCafe24">-</div>
            </div>
        </div>

        <!-- 조회 컨트롤 -->
        <div class="controls">
            <label>시작일</label>
            <input type="date" id="dateFrom">
            <label>종료일</label>
            <input type="date" id="dateTo">
            <button class="btn-collect" id="btnCollect" onclick="collectOrders()">
                주문 수집
            </button>
            <span class="collect-status" id="collectStatus"></span>
            <button class="btn-export" onclick="exportCSV()">CSV 다운로드</button>
        </div>

        <!-- 주문 목록 -->
        <div class="orders-section">
            <div class="orders-header">
                <h2>수집된 주문</h2>
                <span class="total" id="totalCount">총 0건</span>
            </div>
            <div class="orders-table-wrap">
                <table class="orders-table" id="ordersTable">
                    <thead>
                        <tr>
                            <th>플랫폼</th>
                            <th>주문번호</th>
                            <th>주문일시</th>
                            <th>상태</th>
                            <th>상품명</th>
                            <th>수량</th>
                            <th>결제금액</th>
                            <th>수령인</th>
                            <th>연락처</th>
                            <th>주소</th>
                            <th>배송메모</th>
                        </tr>
                    </thead>
                    <tbody id="ordersBody">
                    </tbody>
                </table>
                <div class="empty-state" id="emptyState">
                    <div class="icon">&#128230;</div>
                    <p>주문을 수집하려면 API 설정 후 '주문 수집' 버튼을 클릭하세요</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 설정 모달 -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <button class="modal-close" onclick="closeSettings()">&times;</button>
            <h2>API 설정</h2>

            <!-- 쿠팡 -->
            <div class="config-section">
                <h3><span class="dot coupang"></span> 쿠팡 파트너센터 (WING API)</h3>
                <div class="form-row">
                    <label>Access Key</label>
                    <input type="text" id="cpAccessKey" placeholder="COUPANG WING Access Key">
                </div>
                <div class="form-row">
                    <label>Secret Key</label>
                    <input type="password" id="cpSecretKey" placeholder="COUPANG WING Secret Key">
                </div>
                <div class="form-row">
                    <label>Vendor ID</label>
                    <input type="text" id="cpVendorId" placeholder="업체 코드">
                </div>
                <button class="btn-config-save" onclick="saveCoupangConfig()">연결</button>
                <div class="config-status" id="cpStatus"></div>
            </div>

            <!-- 네이버 -->
            <div class="config-section">
                <h3><span class="dot naver"></span> 네이버 스마트스토어 (Commerce API)</h3>
                <div class="form-row">
                    <label>Application Client ID</label>
                    <input type="text" id="nvClientId" placeholder="애플리케이션 Client ID">
                </div>
                <div class="form-row">
                    <label>Application Client Secret</label>
                    <input type="password" id="nvClientSecret" placeholder="애플리케이션 Client Secret">
                </div>
                <button class="btn-config-save" onclick="saveNaverConfig()">연결</button>
                <div class="config-status" id="nvStatus"></div>
            </div>

            <!-- 카페24 -->
            <div class="config-section">
                <h3><span class="dot cafe24"></span> 카페24 (REST API)</h3>
                <div class="form-row">
                    <label>Mall ID (쇼핑몰 ID)</label>
                    <input type="text" id="c24MallId" placeholder="예: myshop">
                </div>
                <div class="form-row">
                    <label>Client ID</label>
                    <input type="text" id="c24ClientId" placeholder="앱 Client ID">
                </div>
                <div class="form-row">
                    <label>Client Secret</label>
                    <input type="password" id="c24ClientSecret" placeholder="앱 Client Secret">
                </div>
                <div class="form-row">
                    <label>Access Token (선택 - OAuth 인증 완료 시)</label>
                    <input type="text" id="c24AccessToken" placeholder="Access Token">
                </div>
                <div class="form-row">
                    <label>Refresh Token (선택)</label>
                    <input type="text" id="c24RefreshToken" placeholder="Refresh Token">
                </div>
                <button class="btn-config-save" onclick="saveCafe24Config()">연결</button>
                <button class="btn-config-save" onclick="openCafe24Auth()" style="margin-left:8px; background:#636e72;">OAuth 인증</button>
                <div class="config-status" id="c24Status"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let allOrders = [];

        // 기본 날짜 설정 (오늘 ~ 오늘)
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('dateFrom').value = today;
        document.getElementById('dateTo').value = today;

        // localStorage에서 설정 복원
        function loadSavedConfig() {
            const saved = JSON.parse(localStorage.getItem('orderCollectorConfig') || '{}');

            if (saved.coupang) {
                document.getElementById('cpAccessKey').value = saved.coupang.accessKey || '';
                document.getElementById('cpSecretKey').value = saved.coupang.secretKey || '';
                document.getElementById('cpVendorId').value = saved.coupang.vendorId || '';
            }
            if (saved.naver) {
                document.getElementById('nvClientId').value = saved.naver.clientId || '';
                document.getElementById('nvClientSecret').value = saved.naver.clientSecret || '';
            }
            if (saved.cafe24) {
                document.getElementById('c24MallId').value = saved.cafe24.mallId || '';
                document.getElementById('c24ClientId').value = saved.cafe24.clientId || '';
                document.getElementById('c24ClientSecret').value = saved.cafe24.clientSecret || '';
                document.getElementById('c24AccessToken').value = saved.cafe24.accessToken || '';
                document.getElementById('c24RefreshToken').value = saved.cafe24.refreshToken || '';
            }
        }

        function saveConfig(platform, data) {
            const saved = JSON.parse(localStorage.getItem('orderCollectorConfig') || '{}');
            saved[platform] = data;
            localStorage.setItem('orderCollectorConfig', JSON.stringify(saved));
        }

        // 플랫폼 연결 상태 업데이트
        const connectedPlatforms = new Set();

        function updatePlatformStatus(platform, connected) {
            const statusEl = document.getElementById(`status${capitalize(platform)}`);
            if (connected) {
                connectedPlatforms.add(platform);
                statusEl.textContent = '연결됨';
                statusEl.className = 'status connected';
            } else {
                connectedPlatforms.delete(platform);
                statusEl.textContent = '미연결';
                statusEl.className = 'status disconnected';
            }
        }

        function capitalize(str) {
            const map = { coupang: 'Coupang', naver: 'Naver', cafe24: 'Cafe24' };
            return map[str] || str;
        }

        // ── 설정 저장 ──

        async function saveCoupangConfig() {
            const data = {
                accessKey: document.getElementById('cpAccessKey').value.trim(),
                secretKey: document.getElementById('cpSecretKey').value.trim(),
                vendorId: document.getElementById('cpVendorId').value.trim()
            };

            const statusEl = document.getElementById('cpStatus');
            try {
                const res = await fetch(`${API_BASE}/api/config/coupang`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (res.ok) {
                    statusEl.textContent = '연결 성공!';
                    statusEl.className = 'config-status success';
                    saveConfig('coupang', data);
                    updatePlatformStatus('coupang', true);
                } else {
                    throw new Error(result.error);
                }
            } catch (err) {
                statusEl.textContent = '연결 실패: ' + err.message;
                statusEl.className = 'config-status error';
                updatePlatformStatus('coupang', false);
            }
        }

        async function saveNaverConfig() {
            const data = {
                clientId: document.getElementById('nvClientId').value.trim(),
                clientSecret: document.getElementById('nvClientSecret').value.trim()
            };

            const statusEl = document.getElementById('nvStatus');
            try {
                const res = await fetch(`${API_BASE}/api/config/naver`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (res.ok) {
                    statusEl.textContent = '연결 성공!';
                    statusEl.className = 'config-status success';
                    saveConfig('naver', data);
                    updatePlatformStatus('naver', true);
                } else {
                    throw new Error(result.error);
                }
            } catch (err) {
                statusEl.textContent = '연결 실패: ' + err.message;
                statusEl.className = 'config-status error';
                updatePlatformStatus('naver', false);
            }
        }

        async function saveCafe24Config() {
            const data = {
                mallId: document.getElementById('c24MallId').value.trim(),
                clientId: document.getElementById('c24ClientId').value.trim(),
                clientSecret: document.getElementById('c24ClientSecret').value.trim(),
                accessToken: document.getElementById('c24AccessToken').value.trim(),
                refreshToken: document.getElementById('c24RefreshToken').value.trim()
            };

            const statusEl = document.getElementById('c24Status');
            try {
                const res = await fetch(`${API_BASE}/api/config/cafe24`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (res.ok) {
                    statusEl.textContent = '연결 성공!';
                    statusEl.className = 'config-status success';
                    saveConfig('cafe24', data);
                    updatePlatformStatus('cafe24', true);
                } else {
                    throw new Error(result.error);
                }
            } catch (err) {
                statusEl.textContent = '연결 실패: ' + err.message;
                statusEl.className = 'config-status error';
                updatePlatformStatus('cafe24', false);
            }
        }

        async function openCafe24Auth() {
            try {
                const res = await fetch(`${API_BASE}/api/config/cafe24/auth-url`);
                const data = await res.json();
                if (data.url) {
                    window.open(data.url, 'cafe24auth', 'width=600,height=700');
                } else {
                    alert(data.error || '인증 URL을 가져올 수 없습니다.');
                }
            } catch (err) {
                alert('카페24 기본 설정을 먼저 저장해주세요.');
            }
        }

        // ── 주문 수집 ──

        async function collectOrders() {
            const from = document.getElementById('dateFrom').value;
            const to = document.getElementById('dateTo').value;
            const btn = document.getElementById('btnCollect');
            const statusEl = document.getElementById('collectStatus');

            if (!from || !to) {
                statusEl.textContent = '날짜를 선택해주세요.';
                return;
            }

            if (connectedPlatforms.size === 0) {
                statusEl.textContent = '연결된 플랫폼이 없습니다. API 설정을 먼저 해주세요.';
                return;
            }

            btn.disabled = true;
            btn.textContent = '수집 중...';
            statusEl.textContent = '주문 데이터를 가져오는 중...';

            try {
                const res = await fetch(`${API_BASE}/api/orders/all?from=${from}&to=${to}`);
                const data = await res.json();

                if (data.success) {
                    allOrders = data.orders;
                    renderOrders();

                    // 플랫폼별 카운트 업데이트
                    const counts = { coupang: 0, naver: 0, cafe24: 0 };
                    allOrders.forEach(o => { counts[o.platform] = (counts[o.platform] || 0) + 1; });
                    document.getElementById('countCoupang').textContent = connectedPlatforms.has('coupang') ? counts.coupang : '-';
                    document.getElementById('countNaver').textContent = connectedPlatforms.has('naver') ? counts.naver : '-';
                    document.getElementById('countCafe24').textContent = connectedPlatforms.has('cafe24') ? counts.cafe24 : '-';

                    statusEl.textContent = `수집 완료! (${data.totalCount}건)`;

                    if (data.errors.length > 0) {
                        const errMsg = data.errors.map(e => `${e.platform}: ${e.error}`).join(', ');
                        statusEl.textContent += ` | 오류: ${errMsg}`;
                    }
                } else {
                    statusEl.textContent = '수집 실패';
                }
            } catch (err) {
                statusEl.textContent = `오류: ${err.message}`;
            } finally {
                btn.disabled = false;
                btn.textContent = '주문 수집';
            }
        }

        // ── 주문 테이블 렌더링 ──

        function renderOrders() {
            const tbody = document.getElementById('ordersBody');
            const emptyState = document.getElementById('emptyState');
            const totalCount = document.getElementById('totalCount');

            totalCount.textContent = `총 ${allOrders.length}건`;

            if (allOrders.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            tbody.innerHTML = allOrders.map(order => `
                <tr>
                    <td><span class="badge ${order.platform}">${order.platformName}</span></td>
                    <td>${order.orderId}</td>
                    <td>${formatDate(order.orderDate)}</td>
                    <td><span class="badge-status">${order.status}</span></td>
                    <td title="${escapeHtml(order.productName)}">${truncate(order.productName, 30)}</td>
                    <td>${order.quantity}</td>
                    <td>${formatPrice(order.totalPrice)}</td>
                    <td>${escapeHtml(order.receiverName)}</td>
                    <td>${escapeHtml(order.receiverPhone)}</td>
                    <td title="${escapeHtml(order.address)}">${truncate(order.address, 25)}</td>
                    <td>${escapeHtml(order.deliveryMessage || '')}</td>
                </tr>
            `).join('');
        }

        // ── CSV 내보내기 ──

        function exportCSV() {
            if (allOrders.length === 0) {
                alert('내보낼 주문이 없습니다.');
                return;
            }

            const headers = ['플랫폼', '주문번호', '주문일시', '상태', '상품명', '수량', '결제금액', '주문자', '수령인', '연락처', '주소', '우편번호', '배송메모'];
            const rows = allOrders.map(o => [
                o.platformName,
                o.orderId,
                o.orderDate,
                o.status,
                o.productName,
                o.quantity,
                o.totalPrice,
                o.buyerName,
                o.receiverName,
                o.receiverPhone,
                o.address,
                o.zipCode,
                o.deliveryMessage
            ]);

            const bom = '\uFEFF';
            const csv = bom + [headers, ...rows]
                .map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))
                .join('\n');

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `orders_${document.getElementById('dateFrom').value}_${document.getElementById('dateTo').value}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // ── 유틸리티 ──

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            try {
                const d = new Date(dateStr);
                return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
            } catch { return dateStr; }
        }

        function pad(n) { return String(n).padStart(2, '0'); }

        function formatPrice(price) {
            return Number(price).toLocaleString('ko-KR') + '원';
        }

        function truncate(str, max) {
            if (!str) return '';
            return str.length > max ? str.substring(0, max) + '...' : str;
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ── 모달 ──

        function openSettings() {
            loadSavedConfig();
            document.getElementById('settingsModal').classList.add('active');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        document.getElementById('settingsModal').addEventListener('click', function(e) {
            if (e.target === this) closeSettings();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeSettings();
        });

        // 초기화
        loadSavedConfig();
    </script>

</body>
</html>
